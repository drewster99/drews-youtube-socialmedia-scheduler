[project]
name = "youtube-publisher"
version = "0.1.0"
description = "YouTube video publishing pipeline with AI-powered descriptions and social cross-posting"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "jinja2>=3.1",
    "python-multipart>=0.0.18",
    "aiofiles>=24.1",
    "google-api-python-client>=2.160",
    "google-auth-oauthlib>=1.2",
    "google-auth-httplib2>=0.2",
    "anthropic>=0.42",
    "apscheduler>=3.10",
    "httpx>=0.28",
    "aiosqlite>=0.20",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
social = [
    "tweepy>=4.14",
    "atproto>=0.0.55",
    "Mastodon.py>=1.8",
]
dev = [
    "ruff>=0.8",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[project.scripts]
youtube-publisher = "youtube_publisher.main:main"

[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100

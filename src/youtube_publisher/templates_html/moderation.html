{% extends "base.html" %}
{% block title %}Moderation — YouTube Publisher{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Comment Moderation</h1>
    <button class="btn btn-primary" onclick="runNow()">Run Check Now</button>
</div>

<div class="detail-grid">
    <div class="detail-main">
        <div class="card">
            <h2>Moderation Log</h2>
            <div id="log-area">
                <p class="loading">Loading...</p>
            </div>
        </div>
    </div>

    <div class="detail-sidebar">
        <div class="card">
            <h3>Blocked Keywords</h3>
            <div id="blocklist-area">
                <p class="loading">Loading...</p>
            </div>
            <div class="form-row" style="margin-top: 0.5rem;">
                <input type="text" id="new-keyword" placeholder="New keyword or phrase">
                <button class="btn btn-sm" onclick="addKeyword()">Add</button>
            </div>
            <div style="margin-top: 0.5rem;">
                <label>
                    <input type="checkbox" id="is-regex"> Regex pattern
                </label>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadBlocklist() {
    const resp = await fetch('/api/settings/blocklist');
    const items = await resp.json();
    const area = document.getElementById('blocklist-area');
    if (items.length === 0) {
        area.innerHTML = '<p class="empty-state">No blocked keywords.</p>';
        return;
    }
    area.innerHTML = `<ul class="keyword-list">${items.map(i => `
        <li>
            <code>${i.keyword}</code>
            ${i.is_regex ? '<span class="badge">regex</span>' : ''}
            <button class="btn btn-sm btn-danger" onclick="removeKeyword(${i.id})">×</button>
        </li>
    `).join('')}</ul>`;
}

async function addKeyword() {
    const keyword = document.getElementById('new-keyword').value.trim();
    if (!keyword) return;
    const isRegex = document.getElementById('is-regex').checked;
    await fetch('/api/settings/blocklist', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keyword, is_regex: isRegex}),
    });
    document.getElementById('new-keyword').value = '';
    loadBlocklist();
}

async function removeKeyword(id) {
    await fetch(`/api/settings/blocklist/${id}`, {method: 'DELETE'});
    loadBlocklist();
}

async function loadLog() {
    const resp = await fetch('/api/settings/moderation-log');
    const items = await resp.json();
    const area = document.getElementById('log-area');
    if (items.length === 0) {
        area.innerHTML = '<p class="empty-state">No moderation actions yet.</p>';
        return;
    }
    area.innerHTML = `<table class="data-table">
        <thead><tr><th>Date</th><th>Video</th><th>Author</th><th>Comment</th><th>Matched</th><th>Action</th></tr></thead>
        <tbody>${items.map(i => `
            <tr>
                <td>${new Date(i.created_at).toLocaleString()}</td>
                <td><a href="/videos/${i.video_id}">${i.video_id}</a></td>
                <td>${i.author || '—'}</td>
                <td class="comment-preview">${(i.comment_text || '').slice(0, 80)}...</td>
                <td><code>${i.matched_keyword}</code></td>
                <td><span class="badge">${i.action}</span></td>
            </tr>
        `).join('')}</tbody>
    </table>`;
}

async function runNow() {
    showToast('Running moderation check...', 'info');
    // This would ideally trigger the scheduler job
    showToast('Check initiated. Refresh in a moment to see results.', 'success');
}

loadBlocklist();
loadLog();
</script>
{% endblock %}

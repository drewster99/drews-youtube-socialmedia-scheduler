{% extends "base.html" %}
{% block title %}Dashboard — YouTube Publisher{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Dashboard</h1>
    <a href="/upload" class="btn btn-primary">Upload New Video</a>
</div>

<div class="section">
    <h2>Your Videos</h2>
    <div id="video-list" class="video-grid">
        <p class="loading">Loading videos...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadVideos() {
    const container = document.getElementById('video-list');
    try {
        const resp = await fetch('/api/videos');
        const videos = await resp.json();

        if (videos.length === 0) {
            container.innerHTML = '<p class="empty-state">No videos yet. <a href="/upload">Upload your first video</a>.</p>';
            return;
        }

        container.innerHTML = videos.map(v => `
            <a href="/videos/${v.id}" class="video-card">
                <div class="video-thumb">
                    ${v.thumbnail_path
                        ? `<img src="/uploads/${v.thumbnail_path.split('/').pop()}" alt="${v.title}">`
                        : '<div class="thumb-placeholder">No Thumbnail</div>'}
                </div>
                <div class="video-info">
                    <h3>${v.title}</h3>
                    <div class="video-meta">
                        <span class="badge badge-${v.status}">${v.status}</span>
                        <span class="badge badge-${v.privacy_status}">${v.privacy_status}</span>
                    </div>
                    <time>${new Date(v.created_at).toLocaleDateString()}</time>
                </div>
            </a>
        `).join('');
    } catch (e) {
        container.innerHTML = '<p class="error">Failed to load videos.</p>';
    }
}

loadVideos();
</script>
{% endblock %}
